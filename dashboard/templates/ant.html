{% extends "wild_memory_base.html" %}

{% block content %}
<div class="wm-page">
  <!-- Page Header -->
  <div class="wm-page-header">
    <div class="wm-page-header-content">
      <h1 class="wm-page-title">🐜 Formiga — Esquecimento</h1>
      <p class="wm-page-subtitle">O que liberar para manter a mente limpa</p>
    </div>
  </div>

  <!-- Metric Cards -->
  <div class="wm-cards wm-cards-4" id="metricCards">
    <div class="wm-card wm-card-loading">
      <div class="wm-skeleton wm-skeleton-text"></div>
    </div>
    <div class="wm-card wm-card-loading">
      <div class="wm-skeleton wm-skeleton-text"></div>
    </div>
    <div class="wm-card wm-card-loading">
      <div class="wm-skeleton wm-skeleton-text"></div>
    </div>
    <div class="wm-card wm-card-loading">
      <div class="wm-skeleton wm-skeleton-text"></div>
    </div>
  </div>

  <!-- Main Content Grid -->
  <div class="wm-grid wm-grid-2">
    <!-- Left Column -->
    <div class="wm-grid-col">
      <!-- Decay Distribution Chart -->
      <div class="wm-panel" id="decayPanel">
        <div class="wm-panel-header">
          <h2 class="wm-panel-title">Distribuição de Decay</h2>
          <div class="wm-loading wm-loading-spinner"></div>
        </div>
        <div class="wm-panel-content">
          <div class="wm-chart-container">
            <canvas id="decayChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Maintenance Panel -->
      <div class="wm-panel" id="maintenancePanel">
        <div class="wm-panel-header">
          <h2 class="wm-panel-title">Manutenção</h2>
        </div>
        <div class="wm-panel-content">
          <div class="wm-info-list" id="maintenanceInfo">
            <div class="wm-info-item wm-loading-pulse">
              <div class="wm-skeleton wm-skeleton-text" style="width: 60%;"></div>
            </div>
            <div class="wm-info-item wm-loading-pulse">
              <div class="wm-skeleton wm-skeleton-text" style="width: 60%;"></div>
            </div>
          </div>
          <button class="wm-button wm-button-primary wm-button-full" id="runMaintenanceBtn" style="margin-top: 1rem;">
            <span class="wm-button-label">Executar Manutenção Agora</span>
            <span class="wm-button-icon" style="display: none;">⏱️</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Column -->
    <div class="wm-grid-col">
      <!-- Reflections Panel -->
      <div class="wm-panel" id="reflectionsPanel">
        <div class="wm-panel-header">
          <h2 class="wm-panel-title">Reflexões</h2>
          <div class="wm-loading wm-loading-spinner"></div>
        </div>
        <div class="wm-panel-content">
          <div class="wm-table-wrapper" id="reflectionsTable">
            <table class="wm-table">
              <thead>
                <tr>
                  <th>Tipo</th>
                  <th>Conteúdo</th>
                  <th>Importância</th>
                  <th>Data</th>
                </tr>
              </thead>
              <tbody>
                <tr class="wm-table-row-loading">
                  <td colspan="4">
                    <div class="wm-skeleton wm-skeleton-text"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="wm-empty-state" id="reflectionsEmpty" style="display: none;">
            <p class="wm-empty-state-text">Nenhuma reflexão encontrada</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
(function() {
  'use strict';

  let decayChart = null;

  // Load metric cards
  async function loadMetrics() {
    try {
      const data = await WM.get('observations/stats?by_status=true');
      const lifecycle = await WM.get('status');

      const active = data.active || 0;
      const stale = data.stale || 0;
      const archived = data.archived || 0;
      const lastMaintenance = lifecycle.lifecycle?.last_maintenance_at || 'Nunca';

      const metrics = [
        { label: 'Ativo', value: active, icon: '📝', accent: 'ant' },
        { label: 'Obsoleto', value: stale, icon: '👻', accent: 'ant' },
        { label: 'Arquivado', value: archived, icon: '📦', accent: 'ant' },
        { label: 'Última Manutenção', value: formatLastMaintenance(lastMaintenance), icon: '⏱️', accent: 'ant' }
      ];

      const container = document.getElementById('metricCards');
      container.innerHTML = metrics.map((m, i) => `
        <div class="wm-card wm-card-accent-${m.accent}" data-index="${i}">
          <div class="wm-card-icon">${m.icon}</div>
          <div class="wm-card-content">
            <div class="wm-card-label">${m.label}</div>
            <div class="wm-card-value">${m.value}</div>
          </div>
        </div>
      `).join('');
    } catch (error) {
      console.error('Error loading metrics:', error);
    }
  }

  // Load decay distribution chart
  async function loadDecayChart() {
    try {
      const data = await WM.get('decay-distribution');

      const labels = data.buckets || [];
      const counts = data.counts || [];

      // Determine colors based on decay bucket
      const colors = labels.map((label, idx) => {
        const bucketValue = 0.05 + (idx * 0.1); // Center of each bucket
        if (bucketValue >= 0.6) return 'rgba(34, 197, 94, 0.7)';     // Green
        if (bucketValue >= 0.3) return 'rgba(234, 179, 8, 0.7)';     // Yellow
        return 'rgba(239, 68, 68, 0.7)';                             // Red
      });

      const ctx = document.getElementById('decayChart');
      if (decayChart) {
        decayChart.destroy();
      }

      decayChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Observações por Score de Decay',
            data: counts,
            backgroundColor: colors,
            borderColor: colors.map(c => c.replace('0.7', '1')),
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          indexAxis: 'x',
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: {
                color: 'rgba(255, 255, 255, 0.1)'
              },
              ticks: {
                color: 'rgba(255, 255, 255, 0.7)'
              }
            },
            x: {
              grid: {
                display: false
              },
              ticks: {
                color: 'rgba(255, 255, 255, 0.7)'
              }
            }
          }
        }
      });

      document.getElementById('decayPanel').classList.remove('wm-panel-loading');
    } catch (error) {
      console.error('Error loading decay chart:', error);
    }
  }

  // Load maintenance info
  async function loadMaintenanceInfo() {
    try {
      const lifecycle = await WM.get('status');
      const meta = lifecycle.lifecycle || {};

      const totalRuns = meta.total_maintenance_runs || 0;
      const lastRun = meta.last_maintenance_at ? new Date((meta.last_maintenance_at < 1e12 ? meta.last_maintenance_at * 1000 : meta.last_maintenance_at)).toLocaleString('pt-BR') : 'Nunca';
      const nextRun = meta.next_maintenance_at ? new Date((meta.next_maintenance_at < 1e12 ? meta.next_maintenance_at * 1000 : meta.next_maintenance_at)).toLocaleString('pt-BR') : 'Não agendado';
      const schedule = meta.maintenance_schedule || 'Padrão (24h)';

      const html = `
        <div class="wm-info-item">
          <span class="wm-info-label">Total de execuções:</span>
          <span class="wm-info-value">${WM.formatNumber(totalRuns)}</span>
        </div>
        <div class="wm-info-item">
          <span class="wm-info-label">Última execução:</span>
          <span class="wm-info-value">${lastRun}</span>
        </div>
        <div class="wm-info-item">
          <span class="wm-info-label">Próxima execução:</span>
          <span class="wm-info-value">${nextRun}</span>
        </div>
        <div class="wm-info-item">
          <span class="wm-info-label">Agenda:</span>
          <span class="wm-info-value">${schedule}</span>
        </div>
      `;

      document.getElementById('maintenanceInfo').innerHTML = html;
    } catch (error) {
      console.error('Error loading maintenance info:', error);
    }
  }

  // Load reflections table
  async function loadReflections() {
    try {
      const data = await WM.get('reflections');
      const reflections = data.reflections || [];

      const tbody = document.querySelector('#reflectionsTable tbody');

      if (reflections.length === 0) {
        document.getElementById('reflectionsEmpty').style.display = 'block';
        tbody.innerHTML = '';
      } else {
        document.getElementById('reflectionsEmpty').style.display = 'none';
        tbody.innerHTML = reflections.map(r => `
          <tr class="wm-table-row">
            <td>${WM.renderTag(r.type)}</td>
            <td class="wm-table-cell-text">${truncate(r.content, 60)}</td>
            <td>${WM.formatNumber(r.importance || 0)}</td>
            <td>${new Date(r.created_at).toLocaleString('pt-BR', {
              year: '2-digit', month: '2-digit', day: '2-digit',
              hour: '2-digit', minute: '2-digit'
            })}</td>
          </tr>
        `).join('');
      }

      document.getElementById('reflectionsPanel').classList.remove('wm-panel-loading');
    } catch (error) {
      console.error('Error loading reflections:', error);
    }
  }

  // Run maintenance
  async function runMaintenance() {
    const btn = document.getElementById('runMaintenanceBtn');
    const originalLabel = btn.querySelector('.wm-button-label').textContent;

    btn.disabled = true;
    btn.classList.add('wm-button-loading');
    btn.querySelector('.wm-button-label').textContent = 'Executando...';

    try {
      await WM.post('maintenance');
      btn.querySelector('.wm-button-label').textContent = '✓ Concluído';

      // Reload all data
      setTimeout(() => {
        loadMetrics();
        loadDecayChart();
        loadMaintenanceInfo();
        loadReflections();
      }, 500);

      // Reset button after 2s
      setTimeout(() => {
        btn.disabled = false;
        btn.classList.remove('wm-button-loading');
        btn.querySelector('.wm-button-label').textContent = originalLabel;
      }, 2000);
    } catch (error) {
      console.error('Error running maintenance:', error);
      btn.querySelector('.wm-button-label').textContent = '❌ Erro';

      setTimeout(() => {
        btn.disabled = false;
        btn.classList.remove('wm-button-loading');
        btn.querySelector('.wm-button-label').textContent = originalLabel;
      }, 2000);
    }
  }

  // Utility functions
  function formatLastMaintenance(dateStr) {
    if (dateStr === 'Nunca') return 'Nunca';
    try {
      return new Date(dateStr).toLocaleString('pt-BR', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    } catch {
      return dateStr;
    }
  }

  function truncate(str, length) {
    if (!str) return '';
    return str.length > length ? str.substring(0, length) + '…' : str;
  }

  // Event listeners
  document.getElementById('runMaintenanceBtn').addEventListener('click', runMaintenance);

  // Initial load
  loadMetrics();
  loadDecayChart();
  loadMaintenanceInfo();
  loadReflections();

  // Poll for updates every 30 seconds
  setInterval(() => {
    loadMetrics();
    loadMaintenanceInfo();
  }, 30000);
})();
</script>
{% endblock %}
