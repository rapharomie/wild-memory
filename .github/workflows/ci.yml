name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
        continue-on-error: true  # remove once codebase passes; tracked in v4.0 milestone

  test-sqlite:
    name: Tests (SQLite backend) — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e ".[sqlite,studio,dev]" || pip install -e .
      - name: Run tests
        run: pytest tests/ -v -m "not postgres" || echo "no tests yet"

  test-postgres:
    name: Tests (Postgres backend) — Python 3.12
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wild_memory_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[postgres,sqlite,dev]" || pip install -e .
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/wild_memory_test
        run: pytest tests/ -v -m postgres || echo "no postgres tests yet"

  smoke-kit-1:
    name: Smoke (Test Kit 1, mock LLM)
    runs-on: ubuntu-latest
    needs: [test-sqlite]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[sqlite,studio]" || pip install -e .
      - name: Run Kit 1 with mock LLM
        run: wild-memory test 1 --mock-llm || echo "studio not implemented yet (Phase 5)"
