<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block wm_title %}Wild Memory v3.0{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('wild_memory_dashboard.static', filename='wild_memory.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
    <div class="wm-layout">
        <!-- Wild Memory Submenu -->
        <aside class="wm-submenu">
            <div class="wm-submenu-header">
                <div class="wm-submenu-title">🧠 Wild Memory</div>
                <div class="wm-submenu-version">v3.0</div>
            </div>

            <div class="wm-submenu-section">
                <div class="wm-submenu-label">CAMADAS</div>
                <nav>
                    <a href="/wild-memory"
                       class="wm-nav-item {% if active_page == 'overview' %}active{% endif %}"
                       data-layer="overview">
                        <span class="wm-nav-emoji">🧠</span> Overview
                    </a>
                    <a href="/wild-memory/salmon"
                       class="wm-nav-item {% if active_page == 'salmon' %}active{% endif %}"
                       data-layer="salmon">
                        <span class="wm-nav-emoji">🐟</span> Salmão
                    </a>
                    <a href="/wild-memory/bee"
                       class="wm-nav-item {% if active_page == 'bee' %}active{% endif %}"
                       data-layer="bee">
                        <span class="wm-nav-emoji">🐝</span> Abelha
                    </a>
                    <a href="/wild-memory/elephant"
                       class="wm-nav-item {% if active_page == 'elephant' %}active{% endif %}"
                       data-layer="elephant">
                        <span class="wm-nav-emoji">🐘</span> Elefante
                    </a>
                    <a href="/wild-memory/dolphin"
                       class="wm-nav-item {% if active_page == 'dolphin' %}active{% endif %}"
                       data-layer="dolphin">
                        <span class="wm-nav-emoji">🐬</span> Golfinho
                    </a>
                    <a href="/wild-memory/ant"
                       class="wm-nav-item {% if active_page == 'ant' %}active{% endif %}"
                       data-layer="ant">
                        <span class="wm-nav-emoji">🐜</span> Formiga
                    </a>
                    <a href="/wild-memory/chameleon"
                       class="wm-nav-item {% if active_page == 'chameleon' %}active{% endif %}"
                       data-layer="chameleon">
                        <span class="wm-nav-emoji">🦎</span> Camaleão
                    </a>
                </nav>
            </div>

            <div class="wm-submenu-section">
                <div class="wm-submenu-label">SISTEMA</div>
                <nav>
                    <a href="/wild-memory/setup"
                       class="wm-nav-item {% if active_page == 'setup' %}active{% endif %}"
                       data-layer="setup">
                        <span class="wm-nav-emoji">⚙️</span> Setup
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="wm-content">
            {% block wm_content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('wild_memory_dashboard.static', filename='wild_memory.js') }}"></script>
    {% block wm_scripts %}{% endblock %}
</body>
</html>
